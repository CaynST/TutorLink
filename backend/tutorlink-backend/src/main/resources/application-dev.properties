# ================== Perfil: dev ==================

# H2 en memoria con compatibilidad Postgres
spring.datasource.url=jdbc:h2:mem:tutorlink;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# DDL auto para desarrollo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Puerto en desarrollo (evitar choque con otros servicios)
server.port=8081

# Logs (verbose solo en dev)
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
