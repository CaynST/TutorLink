# ================== Perfil: prod ==================

# PostgreSQL (vía variables de entorno; valores por defecto razonables)
spring.datasource.url=${JDBC_URL:jdbc:postgresql://localhost:5432/tutorlink}
spring.datasource.driver-class-name=${JDBC_DRIVER:org.postgresql.Driver}
spring.datasource.username=${JDBC_USER:postgres}
spring.datasource.password=${JDBC_PASSWORD:}

# Estrategia de schema en prod (recomendado validate; puedes cambiar con JPA_DDL_AUTO)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Puerto en producción
server.port=8080

# Consola H2 no aplica en prod
spring.h2.console.enabled=false

# Logs prudentes en prod
logging.level.org.springframework.jdbc.core=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO
